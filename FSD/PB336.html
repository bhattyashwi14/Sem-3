<!DOCTYPE>
<html>
<head>
	<title>PB336</title>
	<style>
		@keyframes exam_prep{
			0%{background-color:purple; transform:scale(1) rotate(0deg);}
			50%{background-color:pink; transform:scale(1.5) rotate(1200deg);}
			100%{background-color:purple; transform:scale(1) rotate(0deg);}
		}
		div{
			width:100px;
			height:100px;
			animation-name:exam_prep;
			animation-duration:5s;
			animation-delay:3s;
			animation-iteration-count:infinite;
			background-color:purple;
		}
	</style>
</head>
<body>
	<div align="center">hehehehehe</div>
</body>
</html>
