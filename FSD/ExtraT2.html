<!DOCTYPE>
<html>
<head>
	<title>ExtraT2</title>
	<style>
		@keyframes exam_prep{
			0%{background-color:purple; transform:scale(1) rotate(0deg); top:0px; left:0px;}
			25%{background-color:aqua; transform:scale(1.5) rotate(45deg); top:0px; left:587px;}
			50%{background-color:pink; transform:scale(2) rotate(90deg); top:587px; left:587px;}
			75%{background-color:teal; transform:scale(2.5) rotate(180deg); top:587px; left:0px;}
			100%{background-color:purple; transform:scale(1) rotate(270deg); top:0px; left:0px;}
		}
		div{
			width:100px;
			height:100px;
			animation-name:exam_prep;
			animation-duration:5s;
			animation-delay:3s;
			animation-iteration-count:infinite;
			background-color:purple;
			position:absolute;
		}
	</style>
</head>
<body>
	<div align="center">hehehehehe</div>
</body>
</html>
