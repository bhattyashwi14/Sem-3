<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Number <input type="text" onchange="fun(this)"><br>
    <script>
        function fun(e)
        {
            var result=1
            for(let i=1;i<=Number(e.value);i++)
            {
                result=result*i;
            }
            alert(`Factorial is ${result}`);
        }
    </script>
</body>
</html>
