<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form onsubmit="fun1(event)">
        <label>Username
            <input type="text" onchange="fun2(this)" oninput="fun3(this)" onfocus="fun4(this)"/>
        </label>
        <label>
            Email
            <input type="email" onchange="fun2(this)" oninput="fun3(this)">
        </label>
        <input type="submit">
    </form>
    <script>
        function fun1(e)
        {
            e.preventDefault()
            alert("Form submitted");
            return false;
        }
        function fun2(e)
        {
            e.style.backgroundColor="yellow";
        }
        function fun3(e)
        {
            e.style.color="red";
        }
        function fun4(e)
        {
            e.style.backgroundColor="pink";
        }
    </script>
</body>
</html>
