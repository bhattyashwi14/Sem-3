<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PB461</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
</head>
<body>
    <form class="mt-4 was-validated">
        <div class="form-floating mb-3">
            <input type="email" class="form-control" placeholder="Email" required>
            <label class="form-label">Email</label>
            <div class="valid-feedback">Success</div>
            <div class="invalid-feedback">Email shouldn't be blank</div>
        </div>

        <div class="form-floating mb-3">
            <input type="password" class=" form-control" placeholder="Passcode" required>
            <label class="form-label">Passcode</label>
            <div class="valid-feedback">Success</div>
            <div class="invalid-feedback">The field shouln't be blank</div>
        </div>

        <div class="form-check">
            <input type="checkbox" class="form-check-input" value="Remember me">
            <label class="form-check-label">Remember Me?</label>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-primary">Reset</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
     integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
</body>
</html>
