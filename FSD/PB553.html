<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="fun()">Compare</button>
    <script>
        function fun()
        {
            var var1=Number(prompt("Enter number 1:"));
            var var2=Number(prompt("Enter number 2:"));
            var var3=Number(prompt("Enter number 3:"));
            if(var1>=var2 && var1>=var3)
            {
                alert(var1+" is greatest");
            }
            else if(var2>=var1 && var2>=var3)
            {
                alert(var2+" is greatest");
            }
            else
            {
                alert(var3+" is greatest");
            }
            
        }
    </script>
</body>
</html>
