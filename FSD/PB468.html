<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PB468</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
    crossorigin="anonymous">
</head>
<body>
    <form class="mt-4 was-validated">
        <div class="form-floating mb-3">
            <input type="text" class="form-control" placeholder="Enter name" required>
            <label class="form-label">Name</label>
            <div class="valid-feedback">Success</div>
            <div class="invalid-feedback">This field shouldn't be blank</div>
        </div>

        <div class="form-floating mb-3">
            <input type="email" class="form-control" required>
            <label class="form-label">Email</label>
            <div class="valid-feedback">Success</div>
            <div class="invalid-feedback">This field shouldn't be blank</div>
        </div>

        <div class="form-floating mb-3">
            <textarea class="form-control" id="msg" placeholder="Leave your message" required></textarea>
            <label for="msg">Message</label>
            <div class="valid-feedback">Success</div>
            <div class="invalid-feedback">This field shouldn't be blank</div>
        </div>

        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#sendModal">Send</button>
        <div class="modal fade" id="sendModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title">SEND</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        Your message is sent successfully! We'll get back to you soon
                    </div>
                </div>
            </div>
        </div>

        <button type="reset" class="btn btn-primary">Reset</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
     integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
</body>
</html>
