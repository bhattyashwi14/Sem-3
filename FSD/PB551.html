<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    String
    <input type="text" id="a1">
    <br>
    <button onclick="fun()">Check Palindrome</button>
    <script>
        function fun()
        {
            var result="";
            let x=document.getElementById("a1").value.toLowerCase();
            for(let i=x.length-1;i>=0;i--)
            {
                result=result+x[i];
            }
            if(result===x)
            {
                alert("Palindrome");
            }
            else
            {
                alert("Not Palindrome");
            }
        }
    </script>
</body>
</html>
