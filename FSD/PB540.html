<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    String<input type="text" onchange="fun(this)">
    <script>
        function fun(e)
        {
            var x=e.value;
            for(let i=0;i<x.length;i++)
            {
                if (x.indexOf(x[i]) < i) continue; 
                var count=1;
                for(let j=i+1;j<x.length;j++)
                {
                    if(x[i]==x[j])
                    {
                        count=count+1;
                    }
                }
                document.write(x[i]+" occurs "+count+" times"+"<br>");
            }
        }
    </script>
</body>
</html>
