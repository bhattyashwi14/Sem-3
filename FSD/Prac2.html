<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body bgcolor="yellow">
    <h2 align="center">Irregular Table</h2>
    <table border="5" cellspacing="3" cellpadding="10" width="30%" align="center" bgcolor="cyan">
        <tr align="center">
            <td rowspan="3">A</td>
            <td>B</td>
            <td colspan="2">C</td>
            <td>D</td>
            <td rowspan="2" colspan="2">E</td>
        </tr>
        <tr align="center">
            <td>F</td>
            <td>G</td>
            <td rowspan="3">H</td>
            <td>I</td>
        </tr>
        <tr align="center">
            <td rowspan="2">J</td>
            <td>K</td>
            <td>L</td>
            <td>M</td>
            <td>N</td>
        </tr>
        <tr align="center">
            <td>O</td>
            <td>P</td>
            <td colspan="3">Q</td>
        </tr>
    </table> 
</body>
</html>
