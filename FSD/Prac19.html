<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function fun(a=3, b=2, c, d)
        {
            let result=Number((a*b)+c-d)
            document.write(`Result=${result}`)
        }
    </script>
    <div>
        <button onclick="fun(undefined,undefined,5,7)">Calculate</button> 
    </div>
    <!-- Passing undefined to use default values of a and b -->
</body>
</html>
