<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var price=100;
        var tax=5;
        var balance=500;
        function fun(price,tax,balance)
        {
            if(balance>=(price+tax))
            {
                alert("Yes")
            }
            else
            {
                alert("No")
            }
        }
        fun(price,tax,balance);
    </script>
</body>
</html>
