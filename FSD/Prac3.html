<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body bgcolor="yellow">
    <form border="5" action="#" method="post" enctype="multipart/form.data">
        <hr>
        <legend><b>Personal Details</b></legend>
        <hr>
        <label>
            Full Name:
            <input type="text" required/>
        </label>
        <br><br>
        <label>
            Email:
            <input type="email" required/>
        </label>
        <br><br>
        <label>
            Mobile Number:
            <input type="text" required/>
        </label>
        <br><br>
        <label>
            Gender:
            <input type="radio" name="gender" required>Female
            <input type="radio" name="gender">Male
        </label>
        <br><br>
        <label>
            Birthdate:
            <input type="date" required/>
        </label>
        <br><br>
        <label>
            Hobbies:
            <input type="checkbox" name="hobbies" required/>Reading
            <input type="checkbox" name="hobbies" required/>Journaling
            <input type="checkbox" name="hobbies" required/>Singing
            <input type="checkbox" name="hobbies" required/>Travelling
        </label>
        <br><br>
        <hr>
        <legend><b>Educational Details</b></legend>
        <hr>
        <label>
            SSC Percentage:
            <input type="number" required/>
        </label>
        <br><br>
        <label>
            HSC Percentage:
            <input type="number" required/>
        </label>
        <br><br>
        <label>
            Branch:
            <select>
                <option>Select</option>
                <option>CE</option>
                <option>IT</option>
                <option>CSE</option>
                <option>CST</option>
                <option>AIML</option>
            </select>
        </label>
        <br><br>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
