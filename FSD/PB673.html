<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function fun(num)
        {
            return new Promise((resolve)=>setTimeout(()=>resolve(num*2),1000));
        }

        async function fun1()
        {
            for(let i=1;i<=3;i++)
            {
                let result=await fun(i);
                console.log(result);
            }
        }

        fun1()
    </script>
</body>
</html>
