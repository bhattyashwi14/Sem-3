<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="fun()">Check number</button>
    <script>
        function fun()
        {
            var var1=prompt("Enter a number")
            if (var1>100)
            {
                alert("Greater than 100")
            }
            else
            {
                alert("Lesser than 100")
            }
        }
    </script>
</body>
</html>
